run_type = "staged_learning"
device = "cuda:0"
tb_logdir = "rl_try_1"
json_out_config = "_try_1.json"

[parameters]
use_checkpoint = false
#smiles_file = "cpd23.smi"
summary_csv_prefix = "round1"
agent_file = "reinvent.prior"
prior_file = "reinvent.prior"

batch_size = 128
unique_sequences = true
randomize_smiles = true

[learning_strategy]

type = "dap"
sigma = 128
rate = 0.0001

[diversity_filter]

type = "IdenticalMurckoScaffold"
bucket_size = 50
minscore = 0.4
minsimilarity = 0.4
penalty_multiplier = 0.5

[[stage]]
chkpt_file = 'test_1.chkpt'
termination = "simple"
max_score = 0.6
min_steps = 25
max_steps = 1000

[stage.scoring]
type = "geometric_mean"

[[stage.scoring.component]]
[stage.scoring.component.QED]
[[stage.scoring.component.QED.endpoint]]
name = "QED"
weight = 1
transform.type = "sigmoid"
transform.low = 0
transform.high = 1
transform.k = 0.2

[[stage.scoring.component]]
[stage.scoring.component.SAScore]
[[stage.scoring.component.SAScore.endpoint]]
name = "SA score"
weight = 1
transform.type = "reverse_sigmoid"
transform.low = 10
transform.high = 1
transform.k = 0.2

[[stage.scoring.component]]
[stage.scoring.component.TanimotoDistance]
[[stage.scoring.component.TanimotoDistance.endpoint]]
name = "TanimotoDistance"
weight = 1.0
transform.type = "sigmoid"
transform.low = 0
transform.high = 1
transform.k = 0.2
[stage.scoring.component.TanimotoDistance.endpoint.params]
smiles = ["C[C@@H](N1C=NC2=CC=C(C3=CC=CC=C3[C@@H]4NCCCC4)C=C12)C5=C(Cl)C=CC(OC)=C5Cl",]
radius = 1
use_counts = true
use_features = true


